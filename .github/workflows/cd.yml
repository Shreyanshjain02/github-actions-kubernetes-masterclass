name: CD

on:
  workflow_dispatch: 
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
     - name: Checkout
       uses: actions/checkout@v4 
     - name: Configure AWS 
       uses: aws-actions/configure-aws-credentials@v4 
       with: 
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 
          aws-region: ${{ vars.AWS_REGION }} 
     - name: Setup kubectl 
       uses: azure/setup-kubectl@v4 
     
     - name: Update kubeconfig 
       run: | 
           aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name dev-skillpulse-eks 
     
     - name: Deploy to EKS 
       run: | 
           kubectl apply -f k8s/




