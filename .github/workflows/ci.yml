name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  frontend-test:

    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: ./frontend
    steps:
      - name: checkout git on runner
        uses: actions/checkout@v6     
      
        
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "latest"          

      - name: Run Biome
        working-directory: "./frontend"  
        run: |
            biome check . --write --unsafe
            biome ci .
     
  backend-test:
    
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: ./backend
    steps:
      - name: checkout git on runner
        uses: actions/checkout@v6
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"    
          cache: true
      
      - name: Download dependencies
        run: |
            go mod tidy
            go mod download

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./backend

      - name: Run golangci-lint
        run: golangci-lint run

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
  
  infrastructure:
    needs: 
          - frontend-test
          - backend-test

    runs-on: ubuntu-latest 
    
    defaults: 
        run: 
          working-directory: terraform/environments/dev 

    steps: 
      - name: Checkout 
        uses: actions/checkout@v4
        
      - name: Configure AWS 
        uses: aws-actions/configure-aws-credentials@v4 
        with: 
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 
            aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init 
        run: terraform init 

      - name: Terraform Format 
        run: terraform fmt 

      - name: Terraform Validate 
        run: terraform validate 

      - name: Terraform Plan 
        run: terraform plan 
        
      - name: Terraform Apply 
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs 
        id: terraform         
        run: | 
            echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV
      
      - name: Setup kubectl 
        uses: azure/setup-kubectl@v4 
     
      - name: Update kubeconfig 
        run: | 
           aws eks update-kubeconfig \
           --region ${{ vars.AWS_REGION }} \
           --name dev-skillpulse-eks
      - name: Create namespace
        run: kubectl apply -f k8s/00-namespace.yaml
        
      - name: Create DB Secret 
        run: | 
          kubectl create secret generic skillpulse-db \
          --namespace skillpulse \
          --from-literal=MYSQL_HOST=${{ env.RDS_ENDPOINT }} \
          --from-literal=MYSQL_PORT=3306 \
          --from-literal=MYSQL_DATABASE=skillpulse \
          --from-literal=MYSQL_USER=skillpulse \
          --from-literal=MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
          --dry-run=client -o yaml | kubectl apply -f -
            

  build-and-push:
    needs:
      - infrastructure
    
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: docker setups-buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ECR 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Frontend 
        run: | 
            docker build -t skillpulse-frontend ./frontend 
            docker tag skillpulse-frontend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev-skillpulse-frontend:latest 
            docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev-skillpulse-frontend:latest 
     
      - name: Build and Push Backend 
        run: | 
            docker build -t skillpulse-backend ./backend 
            docker tag skillpulse-backend:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev-skillpulse-backend:latest 
            docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev-skillpulse-backend:latest


