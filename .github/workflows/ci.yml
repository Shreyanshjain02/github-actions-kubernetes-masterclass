name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  frontend-test:

    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: ./frontend
    steps:
      - name: checkout git on runner
        uses: actions/checkout@v6
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:          
          node-version: 24

      # - name: Install dependencies
      #   run: npm ci  
        
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: "latest"          

      - name: Run Biome
        working-directory: "./frontend"  
        run: |
            biome check . --write --unsafe
            biome ci .

      - name: Run npm audit 
        run: npm audit --audit-level=high

  backend-test:
    
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: ./backend
    steps:
      - name: checkout git on runner
        uses: actions/checkout@v6
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"    
          cache: true
      
      - name: Download dependencies
        run: |
            go mod tidy
            go mod download

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./backend

      - name: Run golangci-lint
        run: golangci-lint run

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  build-and-push:
    needs:
      - frontend-test
      - backend-test
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-backend:{0}', github.sha) }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
